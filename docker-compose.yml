services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    command: npm run start
    env_file:
      - .env
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
    depends_on:
      - music-tag-web

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: npm run worker
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    depends_on:
      - music-tag-web

  music-tag-web:
    image: xhongc/music_tag_web:latest
    ports:
      - "8001:8001"
    volumes:
      - ./data/inbox:/app/media:rw
      - ./data/music:/app/music:rw
      - ./data/music-tag-web:/app/data:rw
