services:
  web:
    image: x-music-app:latest
    build:
      context: .
      dockerfile: Dockerfile
    command: node .next/standalone/server.js
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      MUSIC_DATA_DIR: /app/data
      DATABASE_URL: file:/app/data/app.sqlite
      PORT: 8098
    ports:
      - "8098:8098"
    volumes:
      - ./data:/app/data

  worker:
    image: x-music-app:latest
    build:
      context: .
      dockerfile: Dockerfile
    command: npm run worker
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      MUSIC_DATA_DIR: /app/data
      DATABASE_URL: file:/app/data/app.sqlite
    volumes:
      - ./data:/app/data
