services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    command: npm run start
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      MUSIC_DATA_DIR: /app/data
      DATABASE_URL: file:/app/data/app.sqlite
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
    depends_on:
      - music-tag-web

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: npm run worker
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      MUSIC_DATA_DIR: /app/data
      DATABASE_URL: file:/app/data/app.sqlite
      MUSIC_TAG_WEB_API_URL: http://music-tag-web:8001
    volumes:
      - ./data:/app/data
    depends_on:
      - music-tag-web

  music-tag-web:
    image: xhongc/music_tag_web:latest
    restart: unless-stopped
    ports:
      - "8001:8001"
    volumes:
      - ./data/inbox:/app/media:rw
      - ./data/music:/app/music:rw
      - ./data/music-tag-web:/app/data:rw
