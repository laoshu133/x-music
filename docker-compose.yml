services:
  web:
    image: x-music-app:latest
    build:
      context: .
      dockerfile: Dockerfile
    command: node server.js
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8098:8098"
    volumes:
      - x-music-data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8098/api/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  worker:
    image: x-music-app:latest
    build:
      context: .
      dockerfile: Dockerfile
    command: npm run worker
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - x-music-data:/app/data

volumes:
  x-music-data:
